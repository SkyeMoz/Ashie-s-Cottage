<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#934134" />
  <title>Ashie’s Cottage</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: 'AshieTitle';
      src: url('settings/fonts/title.ttf') format('truetype');
      font-display: swap;
    }

    @font-face {
      font-family: 'AshieSubtitle';
      src: url('settings/fonts/subtitle.ttf') format('truetype');
      font-display: swap;
    }

    @font-face {
      font-family: 'AshieDescription';
      src: url('settings/fonts/description.ttf') format('truetype');
      font-display: swap;
    }

    :root{
      --accent:#934134;
      --accent-deep:#6f2f25;
      --text:#fffaf4;
      --muted:rgba(255,248,240,.78);
      --glass:rgba(147,65,52,.14);
      --glass-strong:rgba(147,65,52,.22);
      --border:rgba(255,255,255,.14);
      --shadow:0 18px 50px rgba(0,0,0,.22);
      --bg:#241713;
      --radius:28px;
      --radius-sm:18px;
      --page-max:1120px;
    }

    *{ box-sizing:border-box; margin:0; padding:0; }
    *, *::before, *::after{ -webkit-tap-highlight-color: transparent; }
    :focus{ outline:none; }
    ::selection{ background:transparent; color:inherit; }

    html,body{
      width:100%;
      min-height:100%;
      overflow-x:hidden;
      scroll-behavior:smooth;
      font-family:'Inter',sans-serif;
      color:var(--text);
      background:var(--bg);
    }

    body{
      position:relative;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding:14px 0;
      isolation:isolate;
      -webkit-user-select:none;
      user-select:none;
      touch-action:manipulation;
    }

    button, a, .card, .chip, .nav-item, .icon-btn{
      -webkit-user-select:none;
      user-select:none;
      -webkit-touch-callout:none;
    }

    .bg{
      position:fixed;
      inset:0;
      z-index:-4;
      background:
        linear-gradient(180deg, rgba(16,10,8,.16), rgba(16,10,8,.12)),
        url('settings/media/Ash.png') center/cover no-repeat;
      filter:saturate(.98) contrast(1.02) brightness(.96);
      transform:scale(1.02);
    }

    .bg::before{
      content:'';
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(17,11,9,.12), rgba(17,11,9,.20)),
        radial-gradient(circle at 50% 16%, rgba(255,237,220,.08), transparent 28%);
      pointer-events:none;
    }

    .vignette{
      position:fixed;
      inset:0;
      z-index:-3;
      background:
        radial-gradient(circle at center, transparent 50%, rgba(0,0,0,.08) 82%, rgba(0,0,0,.18) 100%);
      pointer-events:none;
    }

    .shell{
      width:min(var(--page-max), calc(100vw - 24px));
      padding:8px;
    }

    .frame{
      position:relative;
      min-height:calc(100vh - 28px);
      border-radius:var(--radius);
      padding:16px;
      overflow:hidden;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.14);
      box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.10);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
    }

    .frame::before{
      content:'';
      position:absolute;
      inset:0;
      background:
        linear-gradient(135deg, rgba(255,255,255,.12), transparent 22%, transparent 76%, rgba(255,255,255,.05)),
        radial-gradient(circle at 18% 10%, rgba(255,255,255,.07), transparent 20%);
      pointer-events:none;
    }

    .topbar{
      position:relative;
      z-index:3;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:18px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .brand-mark{
      width:44px;
      height:44px;
      border-radius:16px;
      display:grid;
      place-items:center;
      background:linear-gradient(180deg, rgba(255,255,255,.13), rgba(255,255,255,.06));
      border:1px solid rgba(255,255,255,.14);
      box-shadow:0 10px 22px rgba(0,0,0,.14);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      flex:0 0 auto;
    }

    .brand-mark svg,
    .icon-btn svg,
    .nav-icon svg,
    .mini-icon svg,
    .action-btn svg{
      width:20px;
      height:20px;
      stroke:currentColor;
      fill:none;
      stroke-width:1.9;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .brand-copy{ min-width:0; }

    .brand-title{
      font-family:'AshieTitle','Playfair Display',serif;
      font-size:1.15rem;
      line-height:1.05;
      letter-spacing:.02em;
      text-shadow:0 2px 10px rgba(0,0,0,.12);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .brand-subtitle{
      margin-top:4px;
      font-family:'AshieSubtitle','Inter',sans-serif;
      font-size:.82rem;
      color:rgba(255,248,240,.78);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .top-actions{
      display:flex;
      align-items:center;
      gap:10px;
      position:relative;
      z-index:5;
    }

    .icon-btn{
      width:44px;
      height:44px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.14);
      background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.04));
      color:#fff;
      cursor:pointer;
      display:grid;
      place-items:center;
      box-shadow:0 10px 20px rgba(0,0,0,.12);
      transition:transform .2s ease, background .2s ease, box-shadow .2s ease, border-color .2s ease;
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
    }

    .icon-btn:hover{
      transform:translateY(-1px);
      background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
      border-color:rgba(255,255,255,.20);
      box-shadow:0 14px 28px rgba(0,0,0,.16);
    }

    .nav{
      position:absolute;
      top:58px;
      right:0;
      min-width:220px;
      padding:12px;
      border-radius:22px;
      display:none;
      flex-direction:column;
      gap:10px;
      background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
      border:1px solid rgba(255,255,255,.14);
      box-shadow:0 18px 36px rgba(0,0,0,.18);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      transform-origin:top right;
      animation:popIn .18s ease;
      z-index:20;
    }

    .nav.open{ display:flex; }

    .nav-item{
      display:flex;
      align-items:center;
      gap:10px;
      width:100%;
      padding:11px 12px;
      border-radius:15px;
      border:1px solid transparent;
      background:transparent;
      color:var(--text);
      cursor:pointer;
      text-align:left;
      font:inherit;
      transition:background .2s ease, transform .2s ease, border-color .2s ease;
    }

    .nav-item:hover{
      background:rgba(255,255,255,.08);
      border-color:rgba(255,255,255,.10);
      transform:translateX(2px);
    }

    .nav-item.active{
      background:rgba(255,255,255,.12);
      border-color:rgba(255,255,255,.14);
    }

    .nav-icon{
      width:30px;
      height:30px;
      border-radius:12px;
      display:grid;
      place-items:center;
      background:rgba(255,255,255,.07);
      flex:0 0 auto;
    }

    .nav-label{
      font-size:.95rem;
      font-weight:600;
      letter-spacing:.03em;
    }

    .content{
      position:relative;
      z-index:2;
      padding-bottom:8px;
    }

    .page{
      display:none;
      flex-direction:column;
      gap:18px;
      animation:fadeUp .45s ease;
    }

    .page.active{ display:flex; }

    .hero{
      display:grid;
      grid-template-columns:1.15fr .85fr;
      gap:14px;
      align-items:stretch;
      margin-top:8px;
    }

    .glass-panel{
      position:relative;
      border-radius:26px;
      padding:20px;
      background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.05));
      border:1px solid rgba(255,255,255,.14);
      box-shadow:0 14px 34px rgba(0,0,0,.14), inset 0 1px 0 rgba(255,255,255,.10);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      overflow:hidden;
    }

    .glass-panel::before{
      content:'';
      position:absolute;
      inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,.12), transparent 24%);
      pointer-events:none;
    }

    .eyebrow{
      position:relative;
      z-index:1;
      font-size:.72rem;
      letter-spacing:.24em;
      text-transform:uppercase;
      color:rgba(255,248,240,.74);
      margin-bottom:10px;
      text-shadow:0 2px 8px rgba(0,0,0,.12);
    }

    .hero-title{
      position:relative;
      z-index:1;
      font-family:'AshieTitle','Playfair Display',serif;
      font-size:clamp(2.4rem, 6vw, 4.6rem);
      line-height:.94;
      letter-spacing:.01em;
      text-shadow:0 4px 18px rgba(0,0,0,.16);
      margin-bottom:12px;
    }

    .hero-subtitle,
    .hero-description,
    .section-subtitle,
    .section-description,
    .card-subtitle,
    .card-description,
    .page-text,
    .page-note{
      position:relative;
      z-index:1;
      color:rgba(255,248,240,.80);
      line-height:1.65;
      font-family:'AshieDescription','Inter',sans-serif;
    }

    .hero-subtitle{ font-size:1rem; max-width:52ch; }
    .hero-description{ font-size:.96rem; max-width:60ch; margin-top:12px; }

    .hero-visual{
      min-height:240px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      background:
        radial-gradient(circle at 20% 15%, rgba(255,255,255,.10), transparent 24%),
        linear-gradient(145deg, rgba(255,255,255,.09), rgba(255,255,255,.04));
    }

    .hero-visual-inner{
      position:relative;
      z-index:1;
      padding:22px;
      max-width:18ch;
      font-family:'AshieTitle','Playfair Display',serif;
      font-size:2rem;
      line-height:1.02;
      text-shadow:0 4px 14px rgba(0,0,0,.16);
    }

    .hero-badges{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:18px;
      position:relative;
      z-index:1;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.12);
      color:#fff;
      font-size:.82rem;
      font-weight:600;
      letter-spacing:.02em;
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      cursor:pointer;
      transition:transform .2s ease, background .2s ease, border-color .2s ease;
    }

    .chip:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.10);
      border-color:rgba(255,255,255,.16);
    }

    .sections{
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .section{
      padding:2px 0 0;
    }

    .section-head{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:14px;
      margin:6px 2px 12px;
      flex-wrap:wrap;
    }

    .section-title-wrap{ min-width:0; }

    .section-title{
      font-family:'AshieTitle','Playfair Display',serif;
      font-size:clamp(1.4rem, 3vw, 2rem);
      line-height:1;
      text-shadow:0 2px 10px rgba(0,0,0,.12);
      margin-bottom:6px;
    }

    .section-subtitle{
      font-size:.88rem;
      max-width:68ch;
      color:rgba(255,248,240,.74);
    }

    .section-description{
      font-size:.9rem;
      max-width:68ch;
      color:rgba(255,248,240,.80);
      margin-top:8px;
    }

    .grid{
      display:grid;
      gap:12px;
      grid-template-columns:repeat(var(--cols, 3), minmax(0, 1fr));
    }

    .card-wrap{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .card{
      position:relative;
      border-radius:22px;
      padding:14px;
      background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.05));
      border:1px solid rgba(255,255,255,.14);
      box-shadow:0 12px 26px rgba(0,0,0,.12), inset 0 1px 0 rgba(255,255,255,.10);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      transition:transform .22s ease, border-color .22s ease, box-shadow .22s ease, background .22s ease;
      overflow:hidden;
    }

    .card:hover{
      transform:translateY(-2px);
      border-color:rgba(255,255,255,.20);
      box-shadow:0 16px 30px rgba(0,0,0,.16), inset 0 1px 0 rgba(255,255,255,.10);
      background:linear-gradient(180deg, rgba(255,255,255,.11), rgba(255,255,255,.06));
    }

    .card.is-open{
      border-color:rgba(255,255,255,.22);
      background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.07));
    }

    .card-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
    }

    .card-left{
      display:flex;
      align-items:flex-start;
      gap:12px;
      min-width:0;
      flex:1;
    }

    .mini-icon{
      width:48px;
      height:48px;
      border-radius:16px;
      display:grid;
      place-items:center;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.12);
      flex:0 0 auto;
      box-shadow:0 8px 18px rgba(0,0,0,.10);
    }

    .mini-copy{
      min-width:0;
      flex:1;
    }

    .card-title{
      font-family:'AshieTitle','Playfair Display',serif;
      font-size:1.02rem;
      line-height:1.1;
      letter-spacing:.02em;
      margin-top:1px;
      margin-bottom:6px;
      text-shadow:0 2px 8px rgba(0,0,0,.10);
      overflow-wrap:anywhere;
    }

    .card-subtitle{
      font-size:.82rem;
      color:rgba(255,248,240,.76);
      margin-bottom:4px;
    }

    .card-description{
      font-size:.88rem;
      color:rgba(255,248,240,.84);
    }

    .card-actions{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .action-btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.08);
      color:#fff;
      cursor:pointer;
      font:inherit;
      font-size:.82rem;
      font-weight:600;
      letter-spacing:.02em;
      transition:transform .2s ease, background .2s ease, border-color .2s ease;
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }

    .action-btn:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.11);
      border-color:rgba(255,255,255,.18);
    }

    .toggle-btn{
      width:38px;
      height:38px;
      border-radius:999px;
      display:grid;
      place-items:center;
      flex:0 0 auto;
    }

    .children{
      display:none;
      margin-top:10px;
      padding-left:14px;
      border-left:1px solid rgba(255,255,255,.12);
      gap:10px;
    }

    .children.open{ display:flex; flex-direction:column; }

    .card.level-1{ margin-left:8px; }
    .card.level-2{ margin-left:16px; }
    .card.level-3{ margin-left:24px; }

    .card.level-1 .mini-icon{ width:44px; height:44px; }
    .card.level-1 .card-title{ font-size:.98rem; }
    .card.level-1 .card-description{ font-size:.86rem; }

    .page-head-panel{
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:14px;
      align-items:stretch;
    }

    .page-title{
      font-family:'AshieTitle','Playfair Display',serif;
      font-size:clamp(2.2rem, 5vw, 4rem);
      line-height:.98;
      margin-bottom:10px;
      text-shadow:0 4px 18px rgba(0,0,0,.14);
    }

    .page-subtitle{
      font-family:'AshieSubtitle','Inter',sans-serif;
      font-size:1rem;
      color:rgba(255,248,240,.78);
      line-height:1.6;
      max-width:60ch;
    }

    .page-description{
      margin-top:12px;
      font-size:.96rem;
      max-width:65ch;
    }

    .page-meta{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:18px;
      position:relative;
      z-index:1;
    }

    .back-btn{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:11px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);
      color:#fff;
      text-decoration:none;
      cursor:pointer;
      font-size:.86rem;
      font-weight:600;
      box-shadow:0 10px 20px rgba(0,0,0,.10);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      transition:transform .2s ease, background .2s ease, border-color .2s ease;
    }

    .back-btn:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.09);
      border-color:rgba(255,255,255,.18);
    }

    .footer-note{
      margin-top:18px;
      text-align:center;
      font-size:.76rem;
      color:rgba(255,248,240,.66);
      letter-spacing:.08em;
      text-shadow:0 2px 8px rgba(0,0,0,.10);
      position:relative;
      z-index:1;
    }

    .empty-state{
      padding:18px;
      border-radius:22px;
      background:rgba(255,255,255,.06);
      border:1px dashed rgba(255,255,255,.16);
      color:rgba(255,248,240,.74);
      text-align:center;
    }

    @keyframes fadeUp{ from{ opacity:0; transform:translateY(12px); } to{ opacity:1; transform:translateY(0); } }
    @keyframes popIn{ from{ opacity:0; transform:translateY(8px) scale(.98); } to{ opacity:1; transform:translateY(0) scale(1); } }

    @media (max-width: 980px){
      .hero, .page-head-panel{ grid-template-columns:1fr; }
      .grid{ grid-template-columns:repeat(var(--cols-md, 2), minmax(0, 1fr)); }
    }

    @media (max-width: 680px){
      body{ padding:8px 0; }
      .shell{ width:min(100vw - 16px, var(--page-max)); padding:4px; }
      .frame{ min-height:calc(100vh - 16px); padding:12px; border-radius:24px; }
      .topbar{ margin-bottom:14px; }
      .brand-mark{ width:40px; height:40px; border-radius:14px; }
      .brand-title{ font-size:1rem; }
      .brand-subtitle{ font-size:.76rem; }
      .icon-btn{ width:40px; height:40px; }
      .nav{ min-width:190px; right:0; }
      .hero-visual{ min-height:180px; }
      .grid{ grid-template-columns:1fr; }
      .section-head{ align-items:flex-start; }
      .card{ padding:13px; }
      .mini-icon{ width:44px; height:44px; }
      .card-title{ font-size:.98rem; }
      .page-title{ font-size:clamp(2rem, 9vw, 3.5rem); }
    }

    @media (prefers-reduced-motion: reduce){
      *, *::before, *::after{ animation:none !important; transition:none !important; scroll-behavior:auto !important; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="vignette"></div>

  <main class="shell">
    <section class="frame">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M3 10.5L12 3l9 7.5"></path><path d="M5.5 9.8V20h13V9.8"></path><path d="M9.5 20v-6a2.5 2.5 0 0 1 5 0v6"></path></svg>
          </div>
          <div class="brand-copy">
            <div class="brand-title" id="brandTitle">Ashie’s Cottage</div>
            <div class="brand-subtitle" id="brandSubtitle">A little corner of joy and adventures</div>
          </div>
        </div>

        <div class="top-actions">
          <button class="icon-btn" id="homeBtn" aria-label="Home">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 10.5L12 3l9 7.5"></path><path d="M5.5 9.8V20h13V9.8"></path><path d="M9.5 20v-6a2.5 2.5 0 0 1 5 0v6"></path></svg>
          </button>
          <button class="icon-btn" id="menuBtn" aria-label="Menu">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16"></path><path d="M4 12h16"></path><path d="M4 17h16"></path></svg>
          </button>
          <nav class="nav" id="navMenu" aria-label="Navigation"></nav>
        </div>
      </header>

      <div class="content" id="pageMount"></div>

      <div class="footer-note" id="footerNote">Soft light • warm hearts • storybook calm</div>
    </section>
  </main>

  <script>
    const DEFAULT_CONFIG = {
      appName: "Ashie's Cottage",
      appSubtitle: "A little corner of joy and adventures",
      themeColor: "#934134",
      theme: {
        primary: "#934134",
        secondary: "#6f2f25",

    const state = {
      config: null,
      currentPage: 'home',
      openNav: false,
      expanded: new Set()
    };

    const $ = (sel, root = document) => root.querySelector(sel);

    function safeText(value, fallback = ''){
      return value === undefined || value === null || value === '' ? fallback : String(value);
    }

    function iconSvg(name, fallback = 'menu'){
      return ICONS[name] || ICONS[fallback] || ICONS.menu;
    }

    function setTheme(config){
      const theme = config.theme || {};
      document.documentElement.style.setProperty('--accent', theme.primary || config.themeColor || '#934134');
      document.documentElement.style.setProperty('--accent-deep', theme.secondary || '#6f2f25');
      document.documentElement.style.setProperty('--text', theme.text || '#fffaf4');
      document.documentElement.style.setProperty('--bg', theme.background || '#241713');
      document.querySelector('meta[name="theme-color"]').setAttribute('content', config.themeColor || theme.primary || '#934134');
      document.title = safeText(config.appName, 'Ashie’s Cottage');
    }

    function getNavItems(config){
      return Array.isArray(config.navbar) ? config.navbar : [];
    }

    function buildNav(config){
      const nav = $('#navMenu');
      nav.innerHTML = '';
      getNavItems(config).forEach((item) => {
        const page = item.page || item.id || 'home';
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'nav-item';
        btn.dataset.page = page;
        btn.innerHTML = `
          <span class="nav-icon">${iconSvg(item.icon || page, page)}</span>
          <span class="nav-label">${safeText(item.name || item.text || page, page)}</span>
        `;
        btn.addEventListener('click', () => navigate(page));
        nav.appendChild(btn);
      });
    }

    function fallbackActionLabel(action){
      if (!action) return 'Open';
      switch(action.type){
        case 'openPage': return 'Open';
        case 'openUrl': return 'Visit';
        case 'copyText':
        case 'copyClipboard': return 'Copy';
        case 'openHome': return 'Home';
        default: return 'Open';
      }
    }

    function runAction(item){
      const action = item.action;
      if (!action){
        if (item.children && item.children.length) toggleExpanded(item.id);
        return;
      }

      if (typeof action === 'string'){
        if (action === 'openHome') return navigate('home');
        if (action === 'toggleChildren') return toggleExpanded(item.id);
      }

      switch(action.type){
        case 'openPage':
          navigate(action.target || 'home');
          break;
        case 'openHome':
          navigate('home');
          break;
        case 'openUrl':
          window.open(action.url || 'https://example.com', '_blank', 'noopener,noreferrer');
          break;
        case 'copyText':
        case 'copyClipboard':
          copyToClipboard(action.text || action.value || item.description || item.title || '');
          break;
        case 'toggleChildren':
          toggleExpanded(item.id);
          break;
        case 'scrollTop':
          window.scrollTo({ top: 0, behavior: 'smooth' });
          break;
        default:
          if (item.children && item.children.length) toggleExpanded(item.id);
      }
    }

    async function copyToClipboard(text){
      try{
        if (navigator.clipboard && navigator.clipboard.writeText){
          await navigator.clipboard.writeText(String(text));
          return;
        }
      }catch(_err){}

      const ta = document.createElement('textarea');
      ta.value = String(text);
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      ta.style.top = '-9999px';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try{ document.execCommand('copy'); }catch(_err){}
      ta.remove();
    }

    function isExpanded(id){
      return state.expanded.has(id);
    }

    function toggleExpanded(id){
      if (state.expanded.has(id)) state.expanded.delete(id);
      else state.expanded.add(id);
      renderCurrentPage();
    }

    function renderChip(chip){
      const el = document.createElement('button');
      el.type = 'button';
      el.className = 'chip';
      el.innerHTML = `${chip.icon ? iconSvg(chip.icon, 'home') : ''}<span>${safeText(chip.text, '')}</span>`;
      el.addEventListener('click', () => {
        if (chip.action) runAction({ ...chip, action: chip.action });
      });
      return el;
    }

    function createCard(item, level = 0){
      const wrap = document.createElement('div');
      wrap.className = 'card-wrap';

      const card = document.createElement('div');
      card.className = `card level-${Math.min(level, 3)}`;
      card.dataset.id = item.id || '';
      if (isExpanded(item.id)) card.classList.add('is-open');

      const hasChildren = Array.isArray(item.children) && item.children.length > 0;

      card.innerHTML = `
        <div class="card-head">
          <div class="card-left">
            <div class="mini-icon">${iconSvg(item.icon || 'book', 'book')}</div>
            <div class="mini-copy">
              <div class="card-title">${safeText(item.title, 'Card')}</div>
              ${item.subtitle ? `<div class="card-subtitle">${safeText(item.subtitle, '')}</div>` : ''}
              ${item.description ? `<div class="card-description">${safeText(item.description, '')}</div>` : ''}
            </div>
          </div>
          ${hasChildren ? `<button class="action-btn toggle-btn" type="button" aria-label="Toggle nested cards">${isExpanded(item.id) ? '−' : '+'}</button>` : ''}
        </div>
        <div class="card-actions">
          ${item.action ? `<button class="action-btn" type="button">${safeText(item.actionLabel || fallbackActionLabel(item.action), 'Open')}</button>` : ''}
          ${hasChildren ? `<span class="action-btn">${item.children.length} more</span>` : ''}
        </div>
      `;

      const mainAction = $('.card-left', card);
      const actionButton = $('.card-actions .action-btn', card);
      const toggleButton = $('.toggle-btn', card);

      mainAction.addEventListener('click', () => runAction(item));
      if (actionButton){
        actionButton.addEventListener('click', (e) => {
          e.stopPropagation();
          runAction(item);
        });
      }
      if (toggleButton){
        toggleButton.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleExpanded(item.id);
        });
      }

      wrap.appendChild(card);

      if (hasChildren){
        const children = document.createElement('div');
        children.className = `children${isExpanded(item.id) ? ' open' : ''}`;
        item.children.forEach((child) => {
          children.appendChild(createCard(child, level + 1));
        });
        wrap.appendChild(children);
      }

      return wrap;
    }

    function createSection(section){
      const sec = document.createElement('section');
      sec.className = 'section';

      const head = document.createElement('div');
      head.className = 'section-head';
      head.innerHTML = `
        <div class="section-title-wrap">
          <div class="section-title">${safeText(section.title, 'Section')}</div>
          ${section.subtitle ? `<div class="section-subtitle">${safeText(section.subtitle, '')}</div>` : ''}
          ${section.description ? `<div class="section-description">${safeText(section.description, '')}</div>` : ''}
        </div>
      `;
      sec.appendChild(head);

      const grid = document.createElement('div');
      grid.className = 'grid';
      const cols = Math.max(1, Math.min(4, Number(section.columns || 3)));
      grid.style.setProperty('--cols', String(cols));
      grid.style.setProperty('--cols-md', String(Math.min(cols, 2)));

      const items = Array.isArray(section.items) ? section.items : [];
      if (!items.length){
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.textContent = 'No cards yet.';
        grid.appendChild(empty);
      } else {
        items.forEach((item) => grid.appendChild(createCard(item, 0)));
      }

      sec.appendChild(grid);
      return sec;
    }

    function createHero(page){
      const hero = document.createElement('section');
      hero.className = 'hero';

      const left = document.createElement('div');
      left.className = 'glass-panel';
      left.innerHTML = `
        <div class="eyebrow">${safeText(page.eyebrow || 'Cozy Lifestyle Journal', '')}</div>
        <div class="hero-title">${safeText(page.title || state.config?.appName || 'Ashie’s Cottage', '')}</div>
        <div class="hero-subtitle">${safeText(page.subtitle || state.config?.appSubtitle || '', '')}</div>
        ${page.description ? `<div class="hero-description">${safeText(page.description, '')}</div>` : ''}
      `;

      const chips = document.createElement('div');
      chips.className = 'hero-badges';
      (page.heroChips || []).forEach((chip) => chips.appendChild(renderChip(chip)));
      if (chips.childNodes.length) left.appendChild(chips);

      const right = document.createElement('div');
      right.className = 'glass-panel hero-visual';
      right.innerHTML = `
        <div class="hero-visual-inner">${safeText(page.visualTitle || page.title || state.config?.appName || 'Ashie’s Cottage', '')}</div>
      `;

      hero.appendChild(left);
      hero.appendChild(right);
      return hero;
    }

    function renderPage(pageId){
      const mount = $('#pageMount');
      mount.innerHTML = '';
      const config = state.config;
      const page = config.pages?.[pageId] || config.pages?.home || {};

      const pageRoot = document.createElement('section');
      pageRoot.className = 'page active';
      pageRoot.dataset.page = pageId;

      pageRoot.appendChild(createHero(page));

      const sections = document.createElement('div');
      sections.className = 'sections';
      const list = Array.isArray(page.sections) ? page.sections : [];

      if (!list.length){
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.textContent = 'No sections yet. Add sections and cards in config.json.';
        sections.appendChild(empty);
      } else {
        list.forEach((section) => sections.appendChild(createSection(section)));
      }

      pageRoot.appendChild(sections);

      if (pageId !== 'home'){
        const meta = document.createElement('div');
        meta.className = 'page-meta';
        const back = document.createElement('button');
        back.type = 'button';
        back.className = 'back-btn';
        back.innerHTML = '<span>←</span><span>Back home</span>';
        back.addEventListener('click', () => navigate('home'));
        meta.appendChild(back);
        pageRoot.appendChild(meta);
      }

      mount.appendChild(pageRoot);
    }

    function setActiveNav(pageId){
      document.querySelectorAll('.nav-item').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.page === pageId);
      });
    }

    function navigate(pageId){
      const config = state.config;
      if (!config) return;
      const page = config.pages?.[pageId] ? pageId : (config.settings?.defaultPage || 'home');
      state.currentPage = page;
      setActiveNav(page);
      renderPage(page);
      history.replaceState({}, '', `#${page}`);
      state.openNav = false;
      $('#navMenu').classList.remove('open');
    }

    function applyConfig(config){
      state.config = config;
      setTheme(config);
      $('#brandTitle').textContent = safeText(config.appName, 'Ashie’s Cottage');
      $('#brandSubtitle').textContent = safeText(config.appSubtitle, 'A little corner of joy and adventures');
      $('#footerNote').textContent = safeText(config.footerNote || 'Soft light • warm hearts • storybook calm', 'Soft light • warm hearts • storybook calm');
      buildNav(config);
      const startPage = location.hash.replace('#','') || config.settings?.defaultPage || 'home';
      navigate(startPage);
    }

    async function loadConfig(){
      try{
        const res = await fetch('./config.json', { cache: 'no-store' });
        if (!res.ok) throw new Error(`Config fetch failed: ${res.status}`);
        return await res.json();
      }catch(err){
        console.warn('Using embedded config because config.json could not be loaded.', err);
        return DEFAULT_CONFIG;
      }
    }

    function bindUi(){
      $('#menuBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        state.openNav = !state.openNav;
        $('#navMenu').classList.toggle('open', state.openNav);
      });

      $('#homeBtn').addEventListener('click', () => navigate('home'));

      document.addEventListener('click', (e) => {
        const nav = $('#navMenu');
        const menuBtn = $('#menuBtn');
        if (!nav.contains(e.target) && !menuBtn.contains(e.target)){
          state.openNav = false;
          nav.classList.remove('open');
        }
      });

      window.addEventListener('hashchange', () => {
        const pageId = location.hash.replace('#', '') || state.config?.settings?.defaultPage || 'home';
        navigate(pageId);
      });

      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape'){
          state.openNav = false;
          $('#navMenu').classList.remove('open');
        }
      });
    }

    bindUi();
    loadConfig().then(applyConfig);
  </script>
</body>
</html>
