<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#934134" />
  <title>Ashie’s Cottage</title>

  <style>
    :root{
      --accent:#934134;
      --accent-deep:#6f2f25;
      --text:#fffaf4;
      --muted:rgba(255,248,240,.78);
      --glass:rgba(255,255,255,.10);
      --glass-strong:rgba(255,255,255,.16);
      --border:rgba(255,255,255,.18);
      --shadow:0 18px 50px rgba(0,0,0,.22);
      --bg:#241713;
      --bg-image:none;
      --title-font:'TitleFont', 'Playfair Display', serif;
      --subtitle-font:'SubtitleFont', 'Inter', sans-serif;
      --description-font:'DescriptionFont', 'Inter', sans-serif;
      --radius:26px;
      --frame-pad:16px;
      --topbar-h:58px;
    }

    @font-face {
      font-family: "TitleFont";
      src: url("settings/fonts/title.ttf") format("truetype");
      font-weight: 400 800;
      font-style: normal;
    }

    @font-face {
      font-family: "SubtitleFont";
      src: url("settings/fonts/subtitle.ttf") format("truetype");
      font-weight: 300 700;
      font-style: normal;
    }

    @font-face {
      font-family: "DescriptionFont";
      src: url("settings/fonts/description.ttf") format("truetype");
      font-weight: 300 700;
      font-style: normal;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      -webkit-tap-highlight-color: transparent;
    }

    ::selection{ background: transparent; color: inherit; }
    ::-moz-selection{ background: transparent; color: inherit; }

    html,body{
      width:100%;
      min-height:100%;
      overflow-x:hidden;
      overflow-y:auto;
      scroll-behavior:smooth;
      font-family:var(--description-font);
      color:var(--text);
      background:var(--bg);
      user-select:none;
    }

    body{
      position:relative;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding:12px 0;
      isolation:isolate;
    }

    button, a, .card, .nav-btn, .icon-btn{
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select:none;
    }

    img{
      user-select:none;
      -webkit-user-drag:none;
      pointer-events:none;
    }

    .bg{
      position:fixed;
      inset:0;
      z-index:-3;
      background:
        linear-gradient(180deg, rgba(20,14,12,.22), rgba(20,14,12,.30)),
        radial-gradient(circle at 50% 25%, rgba(255,232,198,.10), transparent 34%),
        radial-gradient(circle at 78% 16%, rgba(255,255,255,.06), transparent 18%);
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      filter:saturate(.98) contrast(.98) brightness(.92);
      transform:scale(1.02);
    }

    .bg::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(90deg, rgba(20,14,12,.28), transparent 15%, transparent 85%, rgba(20,14,12,.28)),
        radial-gradient(circle at 50% 100%, rgba(62,32,22,.22), transparent 30%);
      pointer-events:none;
    }

    .vignette{
      position:fixed;
      inset:0;
      z-index:-2;
      background:
        radial-gradient(circle at center, transparent 30%, rgba(0,0,0,.16) 70%, rgba(0,0,0,.32) 100%),
        linear-gradient(180deg, rgba(255,233,209,.03), rgba(147,65,52,.03));
      pointer-events:none;
    }

    .particles{
      position:fixed;
      inset:0;
      z-index:-1;
      overflow:hidden;
      pointer-events:none;
      opacity:.60;
    }

    .particle{
      position:absolute;
      width:2px;
      height:2px;
      border-radius:50%;
      background:rgba(255,248,236,.55);
      box-shadow:0 0 8px rgba(255,248,236,.20);
      animation:floatUp linear infinite;
    }

    @keyframes floatUp{
      0%{ transform:translate3d(0, 16px, 0) scale(.9); opacity:0; }
      10%{ opacity:.45; }
      50%{ opacity:.72; }
      100%{ transform:translate3d(0, -145vh, 0) scale(1.08); opacity:0; }
    }

    @keyframes fadeUp{
      from{ opacity:0; transform:translateY(14px); }
      to{ opacity:1; transform:translateY(0); }
    }

    @keyframes popIn{
      from{ opacity:0; transform:translateY(10px) scale(.985); }
      to{ opacity:1; transform:translateY(0) scale(1); }
    }

    @keyframes softPulse{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-2px); }
    }

    .shell{
      width:min(980px, calc(100vw - 20px));
      padding:8px;
      animation:fadeUp .55s ease;
    }

    .frame{
      position:relative;
      border-radius:var(--radius);
      padding:var(--frame-pad);
      min-height:calc(100vh - 24px);
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.05));
      border:1px solid rgba(255,255,255,.16);
      box-shadow:
        0 22px 70px rgba(0,0,0,.24),
        inset 0 1px 0 rgba(255,255,255,.14),
        inset 0 -1px 0 rgba(255,255,255,.04);
      backdrop-filter:blur(24px) saturate(155%);
      -webkit-backdrop-filter:blur(24px) saturate(155%);
      overflow:hidden;
    }

    .frame::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(135deg, rgba(255,255,255,.14), transparent 20%, transparent 76%, rgba(255,255,255,.05)),
        radial-gradient(circle at 18% 12%, rgba(255,255,255,.07), transparent 18%);
      pointer-events:none;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      position:relative;
      z-index:5;
      animation:fadeUp .6s ease .04s both;
    }

    .icon-btn{
      width:44px;
      height:44px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.18);
      background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
      box-shadow:
        0 10px 24px rgba(0,0,0,.14),
        inset 0 1px 0 rgba(255,255,255,.16);
      display:grid;
      place-items:center;
      color:#fff;
      cursor:pointer;
      transition:transform .22s ease, box-shadow .22s ease, background .22s ease, border-color .22s ease, opacity .2s ease;
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
    }

    .icon-btn:hover{
      transform:translateY(-2px) scale(1.02);
      box-shadow:
        0 16px 30px rgba(0,0,0,.18),
        0 0 0 1px rgba(255,255,255,.06),
        0 0 24px rgba(147,65,52,.18);
      background:linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.08));
      border-color:rgba(255,255,255,.24);
    }

    .icon-btn svg,
    .card-icon svg,
    .nav-icon svg,
    .action-icon svg{
      width:20px;
      height:20px;
      stroke:currentColor;
      fill:none;
      stroke-width:1.9;
      stroke-linecap:round;
      stroke-linejoin:round;
      flex:0 0 auto;
    }

    .menu-wrap{
      position:relative;
    }

    .nav{
      position:absolute;
      right:0;
      top:54px;
      z-index:30;
      display:none;
      flex-direction:column;
      gap:10px;
      min-width:210px;
      padding:12px;
      border-radius:22px;
      background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
      border:1px solid rgba(255,255,255,.16);
      backdrop-filter:blur(24px) saturate(160%);
      -webkit-backdrop-filter:blur(24px) saturate(160%);
      box-shadow:0 20px 50px rgba(0,0,0,.22);
      transform-origin:top right;
      animation:popIn .16s ease;
    }

    .nav.open{ display:flex; }

    .nav-btn{
      display:flex;
      align-items:center;
      gap:10px;
      width:100%;
      padding:12px 12px;
      border-radius:16px;
      border:1px solid transparent;
      background:transparent;
      color:var(--text);
      cursor:pointer;
      text-align:left;
      transition:background .18s ease, transform .18s ease, border-color .18s ease;
      font:inherit;
    }

    .nav-btn:hover{
      background:rgba(255,255,255,.07);
      border-color:rgba(255,255,255,.10);
      transform:translateX(2px);
    }

    .nav-btn.active{
      background:rgba(255,255,255,.11);
      border-color:rgba(255,255,255,.18);
    }

    .nav-icon{
      width:30px;
      height:30px;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:rgba(255,255,255,.08);
      flex:0 0 auto;
    }

    .nav-label{
      font-size:.94rem;
      letter-spacing:.04em;
      font-weight:600;
      font-family:var(--subtitle-font);
    }

    .content{
      position:relative;
      z-index:2;
      min-height:calc(100vh - 24px - (var(--frame-pad) * 2));
      display:flex;
      flex-direction:column;
    }

    .page{
      flex:1;
      display:none;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:16px 8px 8px;
      animation:fadeUp .65s ease;
    }

    .page.active{ display:flex; }

    .eyebrow{
      font-size:.72rem;
      letter-spacing:.28em;
      text-transform:uppercase;
      color:rgba(255,248,240,.72);
      margin-bottom:10px;
      text-shadow:0 2px 10px rgba(0,0,0,.16);
      font-family:var(--subtitle-font);
    }

    h1{
      font-family:var(--title-font);
      font-size:clamp(2.4rem, 7vw, 4.8rem);
      line-height:.95;
      font-weight:700;
      letter-spacing:.01em;
      text-shadow:0 4px 20px rgba(0,0,0,.18);
      margin-bottom:10px;
    }

    .subtitle{
      font-family:var(--subtitle-font);
      font-size:clamp(.96rem, 2vw, 1.06rem);
      line-height:1.65;
      max-width:580px;
      color:var(--muted);
      text-shadow:0 2px 10px rgba(0,0,0,.12);
    }

    .divider{
      display:flex;
      align-items:center;
      gap:10px;
      margin:16px 0 22px;
      color:rgba(255,248,240,.86);
      user-select:none;
      animation:fadeUp .65s ease .12s both;
    }

    .divider .line{
      width:44px;
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.52), transparent);
    }

    .divider .symbol{
      display:flex;
      align-items:center;
      gap:7px;
      font-size:1rem;
      filter:drop-shadow(0 2px 8px rgba(0,0,0,.12));
    }

    .cards{
      width:min(820px, 100%);
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:12px;
      margin-top:6px;
    }

    .card{
      position:relative;
      border-radius:22px;
      min-height:160px;
      padding:14px;
      color:#fff;
      cursor:pointer;
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.07)),
        radial-gradient(circle at 18% 16%, rgba(255,255,255,.12), transparent 30%);
      border:1px solid rgba(255,255,255,.16);
      box-shadow:
        0 14px 36px rgba(0,0,0,.15),
        inset 0 1px 0 rgba(255,255,255,.12),
        inset 0 -20px 26px rgba(70,24,18,.06);
      backdrop-filter:blur(24px) saturate(160%);
      -webkit-backdrop-filter:blur(24px) saturate(160%);
      display:flex;
      align-items:flex-end;
      justify-content:flex-start;
      overflow:hidden;
      transition:transform .24s ease, box-shadow .24s ease, border-color .24s ease, filter .24s ease;
      animation:fadeUp .65s ease both;
      text-decoration:none;
    }

    .card:hover{
      transform:translateY(-5px);
      box-shadow:
        0 18px 44px rgba(0,0,0,.20),
        0 0 0 1px rgba(255,255,255,.08),
        0 0 22px rgba(147,65,52,.16),
        inset 0 1px 0 rgba(255,255,255,.14);
      border-color:rgba(255,255,255,.24);
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(135deg, rgba(255,255,255,.12), transparent 24%),
        radial-gradient(circle at 82% 14%, rgba(255,255,255,.08), transparent 18%);
      pointer-events:none;
    }

    .card::after{
      content:"";
      position:absolute;
      inset:auto 10px 10px auto;
      width:56px;
      height:56px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,255,255,.10), transparent 68%);
      opacity:.85;
      filter:blur(1px);
      pointer-events:none;
    }

    .card-inner{
      position:relative;
      z-index:1;
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      gap:10px;
    }

    .card-thumb{
      width:100%;
      height:86px;
      border-radius:18px;
      overflow:hidden;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      display:grid;
      place-items:center;
      position:relative;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.10);
    }

    .card-thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .thumb-fallback{
      width:46px;
      height:46px;
      border-radius:16px;
      display:grid;
      place-items:center;
      color:#fff;
      background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.05));
      border:1px solid rgba(255,255,255,.14);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
    }

    .card-title{
      font-family:var(--title-font);
      font-size:1rem;
      font-weight:700;
      letter-spacing:.18em;
      text-transform:uppercase;
      text-shadow:0 2px 8px rgba(0,0,0,.14);
      line-height:1.2;
    }

    .card-sub{
      font-family:var(--subtitle-font);
      font-size:.84rem;
      color:rgba(255,248,240,.78);
      line-height:1.45;
      max-width:22ch;
    }

    .card-desc{
      font-family:var(--description-font);
      font-size:.82rem;
      color:rgba(255,248,240,.68);
      line-height:1.5;
    }

    .card-action-hint{
      display:flex;
      align-items:center;
      gap:8px;
      margin-top:auto;
      font-size:.78rem;
      color:rgba(255,248,240,.76);
      opacity:.85;
    }

    .page-panel{
      width:min(860px, 100%);
      margin-top:18px;
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:14px;
      align-items:stretch;
    }

    .panel{
      border-radius:24px;
      padding:18px;
      background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
      border:1px solid rgba(255,255,255,.16);
      box-shadow:0 14px 36px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.12);
      backdrop-filter:blur(24px) saturate(160%);
      -webkit-backdrop-filter:blur(24px) saturate(160%);
      text-align:left;
    }

    .panel h2{
      font-family:var(--title-font);
      font-size:clamp(1.85rem, 4vw, 2.8rem);
      line-height:1;
      margin-bottom:8px;
    }

    .panel p{
      color:rgba(255,248,240,.80);
      line-height:1.7;
      font-size:.97rem;
      font-family:var(--description-font);
    }

    .subtle-line{
      width:100%;
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.20), transparent);
      margin:10px 0 14px;
    }

    .panel-visual{
      border-radius:24px;
      padding:18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03)),
        radial-gradient(circle at 30% 22%, rgba(255,255,255,.12), transparent 28%);
      border:1px solid rgba(255,255,255,.14);
      box-shadow:0 14px 36px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.12);
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:240px;
      position:relative;
      overflow:hidden;
    }

    .panel-visual::before{
      content:"";
      position:absolute;
      inset:14px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.14);
      opacity:.42;
    }

    .mini-title{
      position:relative;
      z-index:1;
      text-align:center;
      max-width:18ch;
      font-family:var(--title-font);
      font-size:1.95rem;
      line-height:1.05;
    }

    .mini-sub{
      position:relative;
      z-index:1;
      margin-top:10px;
      font-family:var(--subtitle-font);
      font-size:.9rem;
      color:rgba(255,248,240,.78);
      text-align:center;
    }

    .detail-actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:16px;
    }

    .glass-btn{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:12px 15px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.08);
      color:var(--text);
      cursor:pointer;
      backdrop-filter:blur(20px) saturate(160%);
      -webkit-backdrop-filter:blur(20px) saturate(160%);
      text-decoration:none;
      transition:transform .18s ease, background .18s ease, border-color .18s ease;
      font-family:var(--subtitle-font);
      font-weight:600;
    }

    .glass-btn:hover{
      transform:translateY(-2px);
      background:rgba(255,255,255,.12);
      border-color:rgba(255,255,255,.24);
    }

    .back-btn{
      display:inline-flex;
      align-items:center;
      gap:10px;
      margin-top:18px;
      padding:12px 16px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.07);
      color:var(--text);
      cursor:pointer;
      backdrop-filter:blur(20px) saturate(160%);
      -webkit-backdrop-filter:blur(20px) saturate(160%);
      text-decoration:none;
      transition:transform .18s ease, background .18s ease, border-color .18s ease;
      font-family:var(--subtitle-font);
      font-weight:600;
    }

    .back-btn:hover{
      transform:translateY(-2px);
      background:rgba(255,255,255,.11);
      border-color:rgba(255,255,255,.22);
    }

    .bottom-note{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      bottom:14px;
      z-index:2;
      font-size:.76rem;
      color:rgba(255,248,240,.68);
      letter-spacing:.06em;
      text-align:center;
      text-shadow:0 2px 8px rgba(0,0,0,.12);
      font-family:var(--subtitle-font);
      animation:fadeUp .65s ease .24s both;
    }

    .overlay{
      position:fixed;
      inset:0;
      z-index:50;
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      background:rgba(20,14,12,.30);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
    }

    .overlay.open{ display:flex; }

    .overlay-panel{
      width:min(980px, 100%);
      max-height:min(88vh, 900px);
      overflow:auto;
      border-radius:28px;
      padding:18px;
      background:linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.07));
      border:1px solid rgba(255,255,255,.18);
      box-shadow:0 28px 90px rgba(0,0,0,.34);
      backdrop-filter:blur(28px) saturate(170%);
      -webkit-backdrop-filter:blur(28px) saturate(170%);
      animation:popIn .16s ease;
    }

    .overlay-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:14px;
    }

    .crumbs{
      font-family:var(--subtitle-font);
      font-size:.78rem;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:rgba(255,248,240,.72);
      margin-bottom:8px;
    }

    .overlay-title{
      font-family:var(--title-font);
      font-size:clamp(1.7rem, 4vw, 2.8rem);
      line-height:1;
      margin-bottom:8px;
    }

    .overlay-sub{
      font-family:var(--subtitle-font);
      color:rgba(255,248,240,.80);
      line-height:1.6;
      max-width:66ch;
    }

    .close-btn{
      width:44px;
      height:44px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.08);
      color:#fff;
      cursor:pointer;
      display:grid;
      place-items:center;
      flex:0 0 auto;
      transition:transform .18s ease, background .18s ease, border-color .18s ease;
    }

    .close-btn:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.12);
      border-color:rgba(255,255,255,.22);
    }

    .overlay-grid{
      margin-top:16px;
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:12px;
    }

    .overlay-card{
      min-height:170px;
      border-radius:22px;
      padding:14px;
      background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
      border:1px solid rgba(255,255,255,.16);
      box-shadow:0 14px 34px rgba(0,0,0,.16), inset 0 1px 0 rgba(255,255,255,.10);
      backdrop-filter:blur(24px) saturate(160%);
      -webkit-backdrop-filter:blur(24px) saturate(160%);
      cursor:pointer;
      transition:transform .22s ease, border-color .22s ease, background .22s ease;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .overlay-card:hover{
      transform:translateY(-4px);
      border-color:rgba(255,255,255,.24);
      background:linear-gradient(180deg, rgba(255,255,255,.15), rgba(255,255,255,.08));
    }

    .overlay-card .card-title{
      font-size:.92rem;
    }

    .overlay-card .card-sub{
      max-width:none;
    }

    .overlay-card .card-desc{
      flex:1;
    }

    .overlay-card .card-thumb{
      height:78px;
    }

    .overlay-footer{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-top:16px;
      flex-wrap:wrap;
    }

    .empty-state{
      padding:22px;
      border-radius:22px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.12);
      color:rgba(255,248,240,.76);
      font-family:var(--subtitle-font);
      line-height:1.6;
    }

    .hidden{ display:none !important; }

    @media (max-width: 900px){
      .cards,
      .overlay-grid{
        grid-template-columns:1fr 1fr;
      }

      .page-panel{
        grid-template-columns:1fr;
      }

      .panel-visual{
        min-height:160px;
      }
    }

    @media (max-width: 640px){
      body{ padding:8px 0; }
      .shell{ width:min(100vw - 12px, 980px); padding:4px; }
      .frame{
        min-height:calc(100vh - 16px);
        padding:14px;
        border-radius:22px;
      }
      .content{
        min-height:calc(100vh - 16px - 28px);
      }
      .cards,
      .overlay-grid{
        grid-template-columns:1fr;
      }
      .card{
        min-height:148px;
      }
      .card-sub{
        max-width:none;
      }
      .nav{
        right:-4px;
        left:auto;
        min-width:200px;
      }
      .overlay-panel{
        padding:14px;
        border-radius:24px;
      }
      .overlay-head{
        flex-direction:column;
      }
      .close-btn{
        align-self:flex-end;
      }
    }

    @media (prefers-reduced-motion: reduce){
      *{
        animation:none !important;
        transition:none !important;
        scroll-behavior:auto !important;
      }
    }
  </style>
</head>
<body>

  <main class="shell">
    <section class="frame">

          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 10.5L12 3l9 7.5"></path>

        <div class="menu-wrap">

            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 7h16"></path>
              <path d="M4 12h16"></path>
              <path d="M4 17h16"></path>

          <nav class="nav" id="navMenu" aria-label="Navigation"></nav>

      <div class="content">
        <section class="page active" id="page-home" data-page="home">

        <section class="page" id="page-generic" data-page="generic">
          <div class="page-panel">

              <h2 id="pageTitle">Title</h2>
              <div class="subtle-line"></div>
              <p id="pageSubtitle">Subtitle</p>
              <p id="pageContent" style="margin-top:12px;">Content</p>
              <div class="detail-actions" id="pageActions"></div>
              <a href="#home" class="back-btn" id="backBtn" aria-label="Back to home">
                <span>←</span> Back to home
              </a>
            </div>
            <div class="panel-visual" id="panelVisual" aria-hidden="true">
              <div style="position:relative;z-index:1;text-align:center;">
                <div class="mini-title" id="panelVisualText">Ashie’s Cottage</div>

    </section>
  </main>

  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="overlay-panel" role="dialog" aria-modal="true" aria-labelledby="overlayTitle">
      <div class="overlay-head">
        <div>
          <div class="crumbs" id="overlayCrumbs">Home / Card</div>
          <div class="overlay-title" id="overlayTitle">Title</div>
          <div class="overlay-sub" id="overlaySub">Subtitle</div>
        </div>

        <button class="close-btn" id="overlayClose" aria-label="Close overlay">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 6l12 12"></path>
            <path d="M18 6L6 18"></path>
          </svg>
        </button>
      </div>

      <div class="subtle-line"></div>

      <div class="overlay-grid" id="overlayGrid"></div>
      <div class="overlay-footer">
        <div class="empty-state" id="overlayEmpty" class="hidden" style="display:none;">
          No nested cards in this section yet.
        </div>
        <button class="glass-btn" id="overlayHomeBtn" type="button">
          <span class="action-icon">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 10.5L12 3l9 7.5"></path>
              <path d="M5.5 9.8V20h13V9.8"></path>
            </svg>
          </span>
          Back to home
        </button>
      </div>
    </div>
  </div>

  <script>
    const DEFAULT_CONFIG = {
      "appName": "Ashie's Cottage",
      "appSubtitle": "A little corner of joy and adventures",

      "navbar": [

        { "id": "library", "name": "Library", "icon": "book", "page": "library" }
      ],

            },

              "title": "Copy Link",

            }
          ]
        },
        {
          "id": "journeys",
          "title": "Journeys",
          "subtitle": "Tiny escapes",
          "description": "Trips, daydreams, and little adventures.",
          "icon": "backpack",
          "thumbnail": "",
          "action": { "type": "openWebsite", "url": "https://example.com" }
        },
        {
          "id": "stories",
          "title": "Stories",
          "subtitle": "Letters and memories",
          "description": "A soft journal of memories and reflections.",

          "thumbnail": "",

        }
      ],
      "pages": {
        "home": {
          "title": "Ashie’s Cottage",
          "subtitle": "A little corner of joy and adventures",
          "content": "Soft light, warm hearts, and storybook calm.",
          "actions": []
        },
        "recipes": {
          "title": "Recipes",
          "subtitle": "Warm kitchen notes and sweet meals.",
          "content": "This page can hold your recipes, ingredients, steps, and seasonal favorites.",
          "actions": [
            { "label": "Copy recipe text", "icon": "copy", "action": { "type": "copyClipboard", "text": "Recipe copied from Ashie's Cottage." } }
          ]
        },
        "story-1": {
          "title": "Story 1",
          "subtitle": "Chapter one",
          "content": "Nested page content goes here.",
          "actions": [
            { "label": "Open homepage", "icon": "home", "action": { "type": "goHome" } }
          ]
        },
        "stories": {
          "title": "Stories",
          "subtitle": "Letters, memories, and handwritten feelings.",
          "content": "A soft journal for memories, reflections, and chapters.",
          "actions": []
        },
        "library": {
          "title": "Library",
          "subtitle": "Saved pages and nested cards.",
          "content": "A collection of all your cards and subcards.",
          "actions": []
        }
      }
    };

    const ICONS = {
      home: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 10.5L12 3l9 7.5"></path><path d="M5.5 9.8V20h13V9.8"></path><path d="M9.5 20v-6a2.5 2.5 0 0 1 5 0v6"></path></svg>`,
      menu: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16"></path><path d="M4 12h16"></path><path d="M4 17h16"></path></svg>`,
      recipe: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9h12"></path><path d="M8 9c0-2 1.7-4 4-4s4 2 4 4"></path><path d="M9 13h6"></path><path d="M10 13l-2 7"></path><path d="M14 13l2 7"></path><path d="M16.5 9.5l3-3"></path><path d="M15.8 10.2l3.8 3.8"></path></svg>`,
      journeys: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 7.5V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v1.5"></path><path d="M6.5 7.5h11a2 2 0 0 1 2 2V18a2 2 0 0 1-2 2h-11a2 2 0 0 1-2-2V9.5a2 2 0 0 1 2-2Z"></path><path d="M9 12h6"></path><path d="M12 9v6"></path><path d="M7 18l1-5h8l1 5"></path></svg>`,
      stories: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 4.5h7.5A2.5 2.5 0 0 1 16 7v13H6a2 2 0 0 1-2-2v-11a2.5 2.5 0 0 1 2-2.5Z"></path><path d="M16 7h2.5A1.5 1.5 0 0 1 20 8.5v9A1.5 1.5 0 0 1 18.5 19H16"></path><path d="M8 8h5"></path><path d="M8 11h5"></path><path d="M8 14h4.5"></path></svg>`,
      bowl: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 11h16"></path><path d="M5 11c0 4 3.1 7 7 7s7-3 7-7"></path><path d="M9 7c0-1.4 1-2.5 3-2.5S15 5.6 15 7"></path><path d="M10 14l-2 6"></path><path d="M14 14l2 6"></path></svg>`,
      backpack: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 7.5V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v1.5"></path><path d="M6.5 7.5h11a2 2 0 0 1 2 2V18a2 2 0 0 1-2 2h-11a2 2 0 0 1-2-2V9.5a2 2 0 0 1 2-2Z"></path><path d="M9 12h6"></path><path d="M12 9v6"></path></svg>`,
      book: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 4.5h7.5A2.5 2.5 0 0 1 16 7v13H6a2 2 0 0 1-2-2v-11a2.5 2.5 0 0 1 2-2.5Z"></path><path d="M16 7h2.5A1.5 1.5 0 0 1 20 8.5v9A1.5 1.5 0 0 1 18.5 19H16"></path><path d="M8 8h5"></path><path d="M8 11h5"></path><path d="M8 14h4.5"></path></svg>`,
      link: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 13a5 5 0 0 1 0-7l1-1a5 5 0 0 1 7 7l-1 1"></path><path d="M14 11a5 5 0 0 1 0 7l-1 1a5 5 0 0 1-7-7l1-1"></path></svg>`,
      copy: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 9h10v12H9z"></path><path d="M5 15H4a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v1"></path></svg>`,
      open: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 3h7v7"></path><path d="M10 14L21 3"></path><path d="M21 14v7H3V3h7"></path></svg>`,
      close: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12"></path><path d="M18 6L6 18"></path></svg>`
    };

    const state = {
      config: null,
      currentPage: null,
      menuOpen: false,
      overlayPath: [],
      overlayItem: null
    };

    const $ = (sel) => document.querySelector(sel);

    function safeText(value, fallback = '') {
      return (value === undefined || value === null || value === '') ? fallback : String(value);
    }

    function iconSvg(name, fallback = 'menu') {
      return ICONS[name] || ICONS[fallback] || '';
    }

    function setTheme(config) {
      const theme = config.theme || {};
      document.documentElement.style.setProperty('--accent', theme.primary || config.themeColor || '#934134');
      document.documentElement.style.setProperty('--accent-deep', theme.secondary || '#6f2f25');
      document.documentElement.style.setProperty('--text', theme.text || '#fffaf4');
      document.documentElement.style.setProperty('--bg', theme.background || '#241713');
      if (theme.glass) document.documentElement.style.setProperty('--glass', theme.glass);
      if (config.themeColor) document.querySelector('meta[name="theme-color"]').setAttribute('content', config.themeColor);
      document.title = safeText(config.appName, 'Ashie’s Cottage');

      const bgPath = config.assets?.background || 'settings/media/Ash.png';
      $('#bg').style.backgroundImage = `
        linear-gradient(180deg, rgba(20,14,12,.22), rgba(20,14,12,.30)),
        radial-gradient(circle at 50% 25%, rgba(255,232,198,.10), transparent 34%),
        radial-gradient(circle at 78% 16%, rgba(255,255,255,.06), transparent 18%),
        url("${bgPath}")
      `;
    }

    function buildNav(config) {
      const nav = $('#navMenu');
      nav.innerHTML = '';

      (config.navbar || []).forEach((item) => {
        const button = document.createElement('button');
        button.className = 'nav-btn';
        button.type = 'button';
        button.dataset.page = item.page;
        button.setAttribute('aria-label', item.name || item.page || 'Page');
        button.innerHTML = `
          <span class="nav-icon">${iconSvg(item.icon || item.page || 'menu')}</span>
          <span class="nav-label">${safeText(item.name, item.page)}</span>
        `;
        button.addEventListener('click', () => navigate(item.page));
        nav.appendChild(button);
      });
    }

    function thumbMarkup(item) {
      const thumb = item.thumbnail || '';
      if (thumb) {
        return `<img src="${thumb}" alt="" />`;
      }
      return `<div class="thumb-fallback">${iconSvg(item.icon || 'menu')}</div>`;
    }

    function renderHomeCards(config) {
      const wrap = $('#homeCards');
      wrap.innerHTML = '';
      const items = Array.isArray(config.homeCards) ? config.homeCards : [];

      if (!items.length) {
        wrap.innerHTML = `<div class="empty-state">Add cards in <strong>config.json</strong> under <strong>homeCards</strong>.</div>`;
        return;
      }

      items.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.style.animationDelay = `${Math.min(index * 0.08, 0.3)}s`;
        card.innerHTML = `
          <div class="card-inner">
            <div class="card-thumb">${thumbMarkup(item)}</div>
            <div class="card-title">${safeText(item.title, 'CARD')}</div>
            <div class="card-sub">${safeText(item.subtitle, '')}</div>
            <div class="card-desc">${safeText(item.description, '')}</div>
            <div class="card-action-hint">
              <span class="action-icon">${iconSvg(item.children?.length ? 'open' : (item.action?.type === 'copyClipboard' ? 'copy' : 'open'))}</span>
              <span>${item.children?.length ? 'Open nested cards' : 'Open / run action'}</span>
            </div>
          </div>
        `;
        card.addEventListener('click', () => {
          if (Array.isArray(item.children) && item.children.length) {
            openOverlay(item, [item.title || 'Home']);
          } else {
            runAction(item.action, item);
          }
        });
        wrap.appendChild(card);
      });
    }

    function updateHome(config) {
      const home = config.pages?.home || {};
      $('#homeEyebrow').textContent = safeText(config.appSubtitle, 'Cozy Lifestyle Journal');
      $('#homeTitle').textContent = safeText(config.appName, 'Ashie’s Cottage');
      $('#homeSubtitle').textContent = safeText(home.subtitle || home.description || config.appSubtitle, 'A little corner of joy and adventures');
      $('#bottomNote').textContent = safeText(home.footer || 'Soft light • warm hearts • storybook calm');
      $('#panelVisualText').textContent = safeText(config.appName, 'Ashie’s Cottage');
      $('#panelVisualSub').textContent = safeText(home.subtitle || home.description || config.appSubtitle, '');
    }

    function updatePageContent(config, pageId) {
      const page = config.pages?.[pageId] || {};
      const navItem = (config.navbar || []).find(x => x.page === pageId);

      $('#pageEyebrow').textContent = safeText(navItem?.name || 'Page');
      $('#pageTitle').textContent = safeText(page.title, pageId);
      $('#pageSubtitle').textContent = safeText(page.subtitle, '');
      $('#pageContent').textContent = safeText(page.content, 'This page is defined in config.json.');
      $('#panelVisualText').textContent = safeText(page.title || config.appName, config.appName);
      $('#panelVisualSub').textContent = safeText(page.subtitle || page.content || '', '');
      $('#pageActions').innerHTML = '';

      const actions = Array.isArray(page.actions) ? page.actions : [];
      actions.forEach((entry) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'glass-btn';
        btn.innerHTML = `
          <span class="action-icon">${iconSvg(entry.icon || 'open')}</span>
          <span>${safeText(entry.label, 'Action')}</span>
        `;
        btn.addEventListener('click', () => runAction(entry.action));
        $('#pageActions').appendChild(btn);
      });
    }

    function setActiveNav(pageId) {
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.page === pageId);
      });
    }

    function showPage(pageId) {
      const homePage = $('#page-home');
      const genericPage = $('#page-generic');
      const isHome = pageId === 'home';

      homePage.classList.toggle('active', isHome);
      genericPage.classList.toggle('active', !isHome);

      if (!isHome) updatePageContent(state.config, pageId);
      setActiveNav(pageId);
      state.currentPage = pageId;
      history.replaceState({}, '', `#${pageId}`);
    }

    function navigate(pageId) {
      const config = state.config;
      if (!config) return;

      const pages = config.pages || {};
      const resolved = pages[pageId] ? pageId : (config.settings?.defaultPage || 'home');

      showPage(resolved);

      state.menuOpen = false;
      $('#navMenu').classList.remove('open');
    }

    function runAction(action, item = null) {
      if (!action || !action.type) return;

      switch (action.type) {
        case 'openPage':
          navigate(action.target);
          break;

        case 'openWebsite':
          if (action.url) window.open(action.url, '_blank', 'noopener,noreferrer');
          break;

        case 'copyClipboard':
          navigator.clipboard?.writeText(action.text || item?.description || item?.title || '').catch(() => {});
          break;

        case 'goHome':
          navigate('home');
          break;

        default:
          break;
      }
    }

    function renderOverlayCards(list, pathParts) {
      const grid = $('#overlayGrid');
      const empty = $('#overlayEmpty');
      grid.innerHTML = '';

      if (!list || !list.length) {
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';

      list.forEach((item) => {
        const card = document.createElement('div');
        card.className = 'overlay-card';
        card.innerHTML = `
          <div class="card-thumb">${thumbMarkup(item)}</div>
          <div class="card-title">${safeText(item.title, 'CARD')}</div>
          <div class="card-sub">${safeText(item.subtitle, '')}</div>
          <div class="card-desc">${safeText(item.description, '')}</div>
          <div class="card-action-hint">
            <span class="action-icon">${iconSvg(item.children?.length ? 'open' : (item.action?.type === 'copyClipboard' ? 'copy' : 'open'))}</span>
            <span>${item.children?.length ? 'Open nested cards' : 'Run action'}</span>
          </div>
        `;
        card.addEventListener('click', () => {
          if (Array.isArray(item.children) && item.children.length) {
            openOverlay(item, [...pathParts, item.title || 'Card']);
          } else {
            runAction(item.action, item);
            if (item.action?.type === 'openPage' && item.action.target) {
              closeOverlay();
            }
          }
        });
        grid.appendChild(card);
      });
    }

    function openOverlay(item, pathParts = []) {
      state.overlayItem = item;
      state.overlayPath = pathParts;

      $('#overlayCrumbs').textContent = pathParts.join(' / ') || 'Cards';
      $('#overlayTitle').textContent = safeText(item.title, 'Cards');
      $('#overlaySub').textContent = safeText(item.subtitle || item.description || '', '');
      renderOverlayCards(Array.isArray(item.children) ? item.children : [], pathParts);
      $('#overlay').classList.add('open');
      $('#overlay').setAttribute('aria-hidden', 'false');
    }

    function closeOverlay() {
      $('#overlay').classList.remove('open');
      $('#overlay').setAttribute('aria-hidden', 'true');
    }

    function bindUi() {
      $('#menuBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        state.menuOpen = !state.menuOpen;
        $('#navMenu').classList.toggle('open', state.menuOpen);
      });

      $('#homeBtn').addEventListener('click', () => navigate('home'));
      $('#overlayClose').addEventListener('click', closeOverlay);
      $('#overlayHomeBtn').addEventListener('click', () => {
        closeOverlay();
        navigate('home');
      });

      document.addEventListener('click', (e) => {
        const nav = $('#navMenu');
        const menuWrap = document.querySelector('.menu-wrap');
        if (!menuWrap.contains(e.target)) {
          state.menuOpen = false;
          nav.classList.remove('open');
        }
      });

      $('#overlay').addEventListener('click', (e) => {
        if (e.target === $('#overlay')) closeOverlay();
      });

      window.addEventListener('hashchange', () => {
        const pageId = location.hash.replace('#', '') || state.config?.settings?.defaultPage || 'home';
        navigate(pageId);
      });

      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          state.menuOpen = false;
          $('#navMenu').classList.remove('open');
          closeOverlay();
        }
      });
    }

    function applyConfig(config) {
      state.config = config;
      setTheme(config);
      buildNav(config);
      renderHomeCards(config);
      updateHome(config);

      const defaultPage = location.hash.replace('#', '') || config.settings?.defaultPage || 'home';
      navigate(defaultPage);
    }

    async function loadConfig() {
      try {
        const res = await fetch('./config.json', { cache: 'no-store' });
        if (!res.ok) throw new Error(`Config fetch failed: ${res.status}`);
        return await res.json();
      } catch (err) {
        console.warn('Using embedded config because config.json could not be loaded.', err);
        return DEFAULT_CONFIG;
      }
    }

    bindUi();
    loadConfig().then(applyConfig);
  </script>
</body>
  </html>
